<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 — Bracket Simulator</title>
<style>
  :root{
    --bodybg:linear-gradient(160deg,#0b132b,#13203f);
    --bg:#0b132b; --panel:#1c2541; --panel2:#21305a; --line:#2e3a66;
    --gold:#f5c518; --green:#2ecc71; --blue:#4aa3ff; --yellow:#f4d35e;
    --gray:#5b6480; --text:#eef1f8; --muted:#9aa4c4; --win:#1f8a4c;
  }
  body.light{
    --bodybg:linear-gradient(160deg,#eef2f9,#dfe6f4);
    --bg:#eef2f9; --panel:#ffffff; --panel2:#eef2fb; --line:#d4dcee;
    --gold:#e0a800; --green:#1f9d57; --blue:#2f7fd6; --yellow:#d8a400;
    --gray:#9aa3bd; --text:#16203c; --muted:#5c668a; --win:#1f9d57;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bodybg);color:var(--text);
       font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;}
  /* sticky floating top bar */
  .topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
    justify-content:space-between;padding:9px 16px;background:var(--bg);
    border-bottom:1px solid var(--line);box-shadow:0 3px 14px rgba(0,0,0,.30)}
  body.light .topbar{box-shadow:0 3px 14px rgba(0,0,0,.10)}
  .topbar .brand{font-weight:800;font-size:16px;white-space:nowrap;flex:0 0 auto}
  .topbar .tabs{margin:0;flex:1 1 auto;gap:6px}
  .topctrl{display:flex;align-items:center;gap:8px;flex:0 0 auto}
  .langsel{background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:18px;
    padding:7px 10px;font-size:13px;font-weight:700;cursor:pointer}
  .langsel:hover{border-color:var(--gold)}
  .themebtn{background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:18px;
    padding:7px 12px;cursor:pointer;font-size:14px}
  .themebtn:hover{border-color:var(--gold)}
  header{padding:14px 16px 0}
  header{padding:22px 20px 8px;text-align:center}
  header h1{margin:0;font-size:26px;letter-spacing:.5px}
  header h1 .em{color:var(--gold)}
  header p{margin:6px 0 0;color:var(--muted);font-size:14px}
  .wrap{max-width:1180px;margin:0 auto;padding:16px 18px 80px}
  .bar{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:14px 0 6px}
  button.act{background:var(--panel2);color:var(--text);border:1px solid var(--line);
    padding:9px 14px;border-radius:9px;cursor:pointer;font-size:14px}
  button.act:hover{border-color:var(--gold)}
  button.gold{background:var(--gold);color:#13203f;font-weight:700;border:none}
  h2.sec{font-size:18px;margin:30px 0 4px;border-bottom:1px solid var(--line);padding-bottom:8px}
  h2.sec .hint{font-size:13px;color:var(--muted);font-weight:400;margin-left:8px}

  /* Groups */
  .groups{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;margin-top:14px}
  .gcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px}
  .gcard h3{margin:0 0 8px;font-size:15px;display:flex;justify-content:space-between;align-items:center}
  .gcard h3 .reset{font-size:11px;color:var(--muted);cursor:pointer;background:none;border:none;padding:2px 4px}
  .gcard h3 .reset:hover{color:var(--gold)}
  .team{display:flex;align-items:center;gap:9px;padding:8px 10px;margin:5px 0;border-radius:8px;
    background:var(--panel2);border:1px solid transparent;cursor:pointer;user-select:none;font-size:14px}
  .team:hover{border-color:var(--gold)}
  .team .flag{font-size:18px;width:22px;text-align:center}
  .team .nm{flex:1}
  .team .badge{font-size:11px;font-weight:700;border-radius:6px;padding:2px 7px;min-width:20px;text-align:center}
  .r1{background:var(--green);color:#06301a}
  .r2{background:var(--blue);color:#06223f}
  .r3{background:var(--yellow);color:#3d2f00}
  .r4{background:var(--gray);color:#fff;opacity:.85}
  .r1border{border-color:var(--green)} .r2border{border-color:var(--blue)}
  .r3border{border-color:var(--yellow)} .r4border{opacity:.6}

  /* Thirds — ranked standings table */
  #thirds .note{color:var(--muted);font-size:13px;margin:8px 0}
  .thirdsgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px;margin-top:10px}
  .third{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:9px;
    background:var(--panel);border:1px solid var(--line);font-size:14px}
  .third.qual{border-color:var(--green)}
  .third.out{opacity:.62}
  .third .pos{font-weight:800;width:20px;text-align:center;color:var(--muted)}
  .third.qual .pos{color:var(--green)}
  .third .nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .third .nm small{color:var(--muted)}
  .third .pts{font-size:11px;color:var(--muted);text-align:right;line-height:1.25;flex:0 0 auto}
  .third .tag{font-size:10px;font-weight:800;border-radius:5px;padding:2px 6px;flex:0 0 auto}
  .third.qual .tag{background:var(--green);color:#06301a}
  .third.out .tag{background:var(--gray);color:#fff}

  /* Bracket — mirrored 2026 layout */
  .lock{color:var(--muted);font-size:14px;margin-top:10px;padding:14px;background:var(--panel);
    border:1px dashed var(--line);border-radius:10px}
  /* full-bleed: break out of the page's max-width so the bracket fills the screen */
  #bracketHost{width:100vw;margin-left:calc(50% - 50vw);padding:0 12px;box-sizing:border-box}
  .bracket-stage{position:relative;border-radius:16px;padding:10px 14px 18px;
    background:radial-gradient(circle at 50% 32%, #2aa15f 0%, #178a4d 46%, #0a5c34 100%);
    box-shadow:inset 0 0 130px rgba(0,0,0,.30)}
  .stage-head{display:flex;align-items:center;justify-content:center;gap:16px;
    padding:4px 0 14px;color:#fff;font-weight:800;letter-spacing:2px;text-transform:uppercase}
  .stage-head .title{font-size:18px;text-shadow:0 2px 6px rgba(0,0,0,.4)}
  .stage-head .hosts{font-size:21px;letter-spacing:5px}
  .bracket-fit{width:100%;overflow:hidden}
  .bracket26{display:flex;align-items:stretch;width:max-content;transform-origin:top left;
    padding:4px 0 6px;font-size:12px;min-height:740px}
  .side{display:flex;flex:0 0 auto}
  .col{display:flex;flex-direction:column;flex:0 0 auto;min-width:150px}
  .col-r16{min-width:172px}
  .col.center{min-width:184px}
  .collabel{text-align:center;color:#ff5a3c;font-weight:800;letter-spacing:.5px;
    text-transform:uppercase;font-size:10px;padding:4px 0 8px;white-space:nowrap;overflow:hidden}
  .cells{flex:1;display:flex;flex-direction:column}
  .cell{flex:1 1 0;display:flex;flex-direction:column;justify-content:center;position:relative}
  .gamecard{background:var(--panel);border:1px solid var(--line);border-radius:9px;overflow:hidden;margin:4px 0}
  .grow{display:flex;align-items:center;gap:6px;padding:6px 9px;cursor:pointer;
    border-bottom:1px solid var(--line);line-height:1.18}
  .grow:last-child{border-bottom:none}
  .grow:hover{background:var(--panel2)}
  .grow.win{background:var(--win);color:#fff;font-weight:700}
  .grow.empty{color:var(--gray);cursor:default}
  .grow.empty:hover{background:none}
  .grow .seed{font-size:10px;font-weight:800;color:#7a8398;width:22px;flex:0 0 auto;text-align:center}
  .grow.win .seed{color:#dfeee4}
  .grow .flag{font-size:15px;width:18px;text-align:center;flex:0 0 auto}
  .grow .nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  /* connectors: elbows merge each pair, stubs feed the next round */
  .left  .col-r16 .cell::after,.left  .col-oct .cell::after,.left  .col-cua .cell::after,
  .right .col-r16 .cell::after,.right .col-oct .cell::after,.right .col-cua .cell::after{
    content:'';position:absolute;width:13px;border-color:var(--line)}
  .left  .col-r16 .cell::after,.left  .col-oct .cell::after,.left  .col-cua .cell::after{right:-13px;border-right:2px solid var(--line)}
  .right .col-r16 .cell::after,.right .col-oct .cell::after,.right .col-cua .cell::after{left:-13px;border-left:2px solid var(--line)}
  .col-r16 .cell:nth-child(odd)::after,.col-oct .cell:nth-child(odd)::after,.col-cua .cell:nth-child(odd)::after{top:50%;height:50%;border-top:2px solid var(--line)}
  .col-r16 .cell:nth-child(even)::after,.col-oct .cell:nth-child(even)::after,.col-cua .cell:nth-child(even)::after{top:0;height:50%;border-bottom:2px solid var(--line)}
  /* incoming stubs */
  .left  .col-oct .cell::before,.left  .col-cua .cell::before,.left  .col-sem .cell::before{content:'';position:absolute;left:-13px;top:50%;width:13px;height:2px;background:var(--line)}
  .right .col-oct .cell::before,.right .col-cua .cell::before,.right .col-sem .cell::before{content:'';position:absolute;right:-13px;top:50%;width:13px;height:2px;background:var(--line)}
  /* semifinal straight line into the centre */
  .left  .col-sem .cell::after{content:'';position:absolute;right:-13px;top:50%;width:13px;height:2px;background:var(--line)}
  .right .col-sem .cell::after{content:'';position:absolute;left:-13px;top:50%;width:13px;height:2px;background:var(--line)}
  .center .cells{justify-content:center;align-items:center}
  .trophy{font-size:40px;text-align:center;margin:2px 0 6px}
  .finalcard{width:100%}
  .champ{margin-top:12px;text-align:center;background:linear-gradient(160deg,var(--gold),#e0a800);
    color:#13203f;border-radius:12px;padding:12px 14px;width:100%;box-shadow:0 8px 26px rgba(245,197,24,.22)}
  .champ .lbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:800;opacity:.8}
  .champ .cn{font-size:17px;font-weight:800;margin-top:4px}
  .champ .cn .flag{font-size:20px}
  .champ.empty{background:var(--panel);color:var(--muted);box-shadow:none;border:1px dashed var(--line)}
  /* official green-stage skin: white cards + white connectors + orange labels */
  .bracket-stage{--line:rgba(255,255,255,.85)}
  .bracket-stage .collabel{color:#ff5128;text-shadow:0 1px 2px rgba(0,0,0,.3)}
  .bracket-stage .gamecard{background:#fbfdff;border:1px solid rgba(255,255,255,.9);
    box-shadow:0 2px 7px rgba(0,0,0,.20)}
  .bracket-stage .grow{color:#152038;border-bottom:1px solid #dfe5ee}
  .bracket-stage .grow:hover{background:#eaf1f7}
  .bracket-stage .grow.win{background:#1f9d57;color:#fff}
  .bracket-stage .grow.win:hover{background:#1b8c4d}
  .bracket-stage .grow.empty{color:#aab2c2}
  .bracket-stage .grow.empty:hover{background:none}
  .bracket-stage .lock{color:#fff;background:rgba(0,0,0,.20);border:1px dashed rgba(255,255,255,.55)}
  .bracket-stage .trophy{filter:drop-shadow(0 4px 10px rgba(0,0,0,.45))}
  .bracket-stage .champ.empty{background:rgba(255,255,255,.13);color:#eafff2;border:1px dashed rgba(255,255,255,.6)}
  /* Standings tables (league-table style) */
  .standings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;margin-top:14px}
  .sttable{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .sthead{font-weight:800;padding:10px 14px;border-bottom:1px solid var(--line);font-size:15px}
  .provtag{font-size:10px;color:var(--yellow);font-weight:700;margin-left:6px}
  .stt{width:100%;border-collapse:collapse;font-size:13px;table-layout:auto}
  .stt th,.stt td{padding:7px 5px;text-align:center;white-space:nowrap}
  .stt th{color:var(--muted);font-size:11px;font-weight:700;border-bottom:1px solid var(--line)}
  .stt td.pos,.stt th.pos{width:20px;color:var(--muted)}
  .stt td.team,.stt th.team{text-align:left;width:99%;overflow:hidden;text-overflow:ellipsis;padding-left:8px}
  .stt td.team .flag{font-size:16px;margin-right:5px}
  .stt td.ptsc,.stt th.ptsc{font-weight:800}
  .stt tbody tr{border-bottom:1px solid var(--line)}
  .stt tbody tr:last-child{border-bottom:none}
  .stt tbody tr.adv{box-shadow:inset 3px 0 0 var(--green)}
  .stt tbody tr.third{box-shadow:inset 3px 0 0 var(--yellow)}
  /* Tabs + views */
  .tabs{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:18px 0 6px}
  .tab{background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:22px;
    padding:8px 18px;cursor:pointer;font-size:14px;font-weight:600}
  .tab:hover{border-color:var(--gold)}
  .tab.active{border-color:#fff;box-shadow:inset 0 0 0 1px #fff;background:var(--panel)}
  .view{display:none}
  .view.active{display:block}
  .team .gpts{font-size:11px;color:var(--muted);margin-right:6px}
  /* info cards for overview / stats / players / matches */
  .cardgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;margin-top:16px}
  .infocard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .infocard h3{margin:0 0 10px;font-size:15px;display:flex;align-items:center;gap:8px}
  .infocard .big{font-size:24px;font-weight:800;line-height:1.2}
  .infocard .sub{color:var(--muted);font-size:13px;margin-top:4px;line-height:1.5}
  .listrow{display:flex;align-items:center;gap:10px;padding:7px 2px;border-top:1px solid var(--line);font-size:14px}
  .listrow:first-of-type{border-top:none}
  .listrow .rank{width:20px;color:var(--muted);font-weight:700;text-align:center}
  .listrow .flag{font-size:18px;width:24px;text-align:center}
  .listrow .nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .listrow .nm small{color:var(--muted)}
  .listrow .val{font-weight:800}
  .pagectrl{margin-left:auto;display:inline-flex;align-items:center;gap:6px}
  .parrow{background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:8px;
    width:26px;height:26px;cursor:pointer;font-size:15px;line-height:1;display:inline-flex;
    align-items:center;justify-content:center;padding:0}
  .parrow:hover:not([disabled]){border-color:var(--gold)}
  .parrow[disabled]{opacity:.35;cursor:default}
  .pageind{font-size:12px;color:var(--muted);min-width:44px;text-align:center;font-weight:700}
  .matchcard{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line);
    border-radius:10px;padding:10px 12px;font-size:14px;cursor:pointer}
  .matchcard:hover{border-color:var(--gold)}
  .mscore{font-weight:800;font-size:14px;color:var(--text);padding:0 4px;white-space:nowrap;flex:0 0 auto}
  /* match details popover */
  .mpop{position:absolute;z-index:200;width:280px;max-width:90vw;background:var(--panel);
    border:1px solid var(--line);border-radius:12px;box-shadow:0 14px 44px rgba(0,0,0,.5);
    padding:12px 14px;font-size:13px;display:none}
  .mpop-stage{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#ff5128;margin-bottom:9px}
  .mpop-teams{display:flex;align-items:center;justify-content:space-between;gap:8px;font-weight:700}
  .mpop-side{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
  .mpop-side.r{justify-content:flex-end;text-align:right}
  .mpop-side .flag{font-size:17px;flex:0 0 auto}
  .mpop-score{font-weight:900;font-size:17px;white-space:nowrap;flex:0 0 auto}
  .mpop-pts{font-size:11px;color:var(--muted);font-weight:600;flex:0 0 auto}
  .mpop-info{margin-top:10px;color:var(--muted);font-size:12px;line-height:1.7;border-top:1px solid var(--line);padding-top:9px}
  .matchcard .t{display:flex;align-items:center;gap:7px;flex:1;min-width:0}
  .matchcard .t.r{justify-content:flex-end;text-align:right}
  .matchcard .t .flag{font-size:16px;flex:0 0 auto}
  .matchcard .t .nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .matchcard .seed{font-size:10px;color:var(--muted);font-weight:700;flex:0 0 auto}
  .matchcard .vs{color:var(--muted);font-weight:700;font-size:12px;padding:0 2px;flex:0 0 auto}
  .viewnote{color:var(--muted);font-size:13px;margin:12px 2px}
  /* ⭐ Cristiano Ronaldo featured card */
  .cr7card{background:linear-gradient(135deg,#ffd84d,#e0a800);color:#1c1300;border-radius:14px;
    padding:16px 18px;margin:16px 0;border:1px solid #ffe680;box-shadow:0 10px 30px rgba(245,197,24,.30)}
  .cr7tag{font-size:12px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;opacity:.85}
  .cr7name{font-size:24px;font-weight:900;margin-top:4px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .cr7name .flag{font-size:28px}
  .cr7g{background:rgba(0,0,0,.20);color:#fff;border-radius:20px;padding:2px 12px;font-size:15px;font-weight:800}
  .cr7note{font-size:13px;margin-top:8px;font-weight:600;opacity:.92}
  .listrow.cr7row{background:linear-gradient(135deg,rgba(245,197,24,.20),rgba(245,197,24,.06));
    border-radius:8px;border-top:none;font-weight:800}
  .listrow.cr7row .nm small{color:var(--gold)}
  .mgrp{font-size:14px;font-weight:800;margin:16px 2px 2px}
  .outlink{color:var(--blue);text-decoration:none;font-weight:600;cursor:pointer}
  .outlink:hover{text-decoration:underline}
  footer{text-align:center;color:var(--muted);font-size:12px;margin-top:30px;line-height:1.6}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">🏆 FIFA World Cup <span class="em">2026</span></div>
  <div class="tabs" id="tabs">
    <button class="tab" data-view="overview" data-i18n="tab_overview">Overview</button>
    <button class="tab" data-view="matches" data-i18n="tab_matches">Matches</button>
    <button class="tab" data-view="standings" data-i18n="tab_standings">Standings</button>
    <button class="tab" data-view="bracket" data-i18n="tab_bracket">Bracket</button>
    <button class="tab" data-view="stats" data-i18n="tab_stats">Stats</button>
    <button class="tab" data-view="players" data-i18n="tab_players">Players</button>
  </div>
  <div class="topctrl">
    <select id="langSel" class="langsel" aria-label="Language">
      <option value="en">🇺🇸 EN</option>
      <option value="es">🇲🇽 ES</option>
      <option value="pt">🇧🇷 PT</option>
    </select>
    <button class="themebtn" id="themeBtn">🌙</button>
  </div>
</div>

<header>
  <p id="subtitle"></p>
</header>

<div class="wrap">
  <div class="bar">
    <button class="act gold" id="realBtn"></button>
    <button class="act" id="clearBtn"></button>
  </div>
  <p id="realNote" style="text-align:center;color:var(--muted);font-size:13px;margin:2px 0 0"></p>

  <section class="view" id="v-overview"><div id="overviewHost"></div></section>

  <section class="view" id="v-matches"><div id="matchesHost"></div></section>

  <section class="view" id="v-standings">
    <h2 class="sec" id="hGroupStage"></h2>
    <div class="standings-grid" id="standingsHost"></div>
    <h2 class="sec" id="hThirds"></h2>
    <div id="thirds">
      <div class="note" id="thirdNote"></div>
      <div class="thirdsgrid" id="thirdsGrid"></div>
    </div>
  </section>

  <section class="view" id="v-bracket">
    <div id="bracketHost"></div>
  </section>

  <section class="view" id="v-stats"><div id="statsHost"></div></section>

  <section class="view" id="v-players"><div id="playersHost"></div></section>

  <footer id="footer"></footer>
</div>

<script>
const FLAG = {
 "Mexico":"🇲🇽","South Africa":"🇿🇦","South Korea":"🇰🇷","Czech Republic":"🇨🇿",
 "Canada":"🇨🇦","Bosnia and Herzegovina":"🇧🇦","Qatar":"🇶🇦","Switzerland":"🇨🇭",
 "Brazil":"🇧🇷","Morocco":"🇲🇦","Haiti":"🇭🇹","Scotland":"🏴󠁧󠁢󠁳󠁣󠁴󠁿",
 "United States":"🇺🇸","Paraguay":"🇵🇾","Australia":"🇦🇺","Turkey":"🇹🇷",
 "Germany":"🇩🇪","Curaçao":"🇨🇼","Ivory Coast":"🇨🇮","Ecuador":"🇪🇨",
 "Netherlands":"🇳🇱","Japan":"🇯🇵","Sweden":"🇸🇪","Tunisia":"🇹🇳",
 "Belgium":"🇧🇪","Egypt":"🇪🇬","Iran":"🇮🇷","New Zealand":"🇳🇿",
 "Spain":"🇪🇸","Cape Verde":"🇨🇻","Saudi Arabia":"🇸🇦","Uruguay":"🇺🇾",
 "France":"🇫🇷","Senegal":"🇸🇳","Iraq":"🇮🇶","Norway":"🇳🇴",

// ---------- GROUPS ----------
// Compute a real league table for one group from the match results (MATCH_INFO).
function computeGroupTable(L){
  const teams={}; GROUPS[L].forEach(tm=>teams[tm]={t:tm,mp:0,w:0,d:0,l:0,gf:0,ga:0,pts:0});
  const ts=GROUPS[L];
  for(let i=0;i<ts.length;i++) for(let j=i+1;j<ts.length;j++){
    const info=MATCH_INFO[matchKey(ts[i],ts[j])];
    if(!info || !info.s) continue;
    const home=info.h, away=(home===ts[i]?ts[j]:ts[i]);
    const hg=info.s[0], ag=info.s[1], H=teams[home], A=teams[away];
    H.mp++; A.mp++; H.gf+=hg; H.ga+=ag; A.gf+=ag; A.ga+=hg;
    if(hg>ag){ H.w++; H.pts+=3; A.l++; }
    else if(hg<ag){ A.w++; A.pts+=3; H.l++; }
    else { H.d++; A.d++; H.pts++; A.pts++; }
  }
  const arr=Object.values(teams);
  arr.forEach(o=>o.gd=o.gf-o.ga);
  arr.sort((a,b)=> b.pts-a.pts || b.gd-a.gd || b.gf-a.gf || (a.t<b.t?-1:1));
  return arr;
}
// Standings tab: a league table per group (MP W D L GF GA GD Pts), top 2 green, 3rd yellow.
function renderStandings(){
  let html="";
  LETTERS.forEach(L=>{
    const rows=computeGroupTable(L);
    const prov=PROVISIONAL.includes(L)?` <span class="provtag">${t('provisional')}</span>`:``;
    html+=`<div class="sttable"><div class="sthead">${t('group')} ${L}${prov}</div>`

      +`<th>${t('col_gf')}</th><th>${t('col_ga')}</th><th>${t('col_gd')}</th><th class="ptsc">${t('col_pts')}</th></tr></thead><tbody>`;
    rows.forEach((o,i)=>{

      html+=`<tr class="${cls}"><td class="pos">${i+1}</td>`
        +`<td class="team"><span class="flag">${FLAG[o.t]||"🏳️"}</span> ${tname(o.t)}</td>`
        +`<td>${o.mp}</td><td>${o.w}</td><td>${o.d}</td><td>${o.l}</td>`
        +`<td>${o.gf}</td><td>${o.ga}</td><td>${o.gd>0?"+":""}${o.gd}</td><td class="ptsc">${o.pts}</td></tr>`;
    });
    html+=`</tbody></table></div>`;
  });
  document.getElementById("standingsHost").innerHTML=html;
}

// ---------- THIRDS ----------
// Rank the third-placed teams of all completed groups by real points (then GD, GF, group).
// The best 8 qualify automatically. Returns {ranked:[...], qualifiedLetters:[...]}.
function computeThirds(){
  const list = LETTERS.filter(groupDone).map(L=>{
    const name = placed(L,2);
    const s = REAL_THIRD_STATS[name] || null;
    return {L, name, s};
  });
  list.sort((a,b)=>{
    const x=a.s, y=b.s;
    if(!x && !y) return a.L<b.L?-1:1;
    if(!x) return 1; if(!y) return -1;
    return (y.p-x.p) || (y.gd-x.gd) || (y.gf-x.gf) || (a.L<b.L?-1:1);
  });
  const qualifiedLetters = list.slice(0,8).map(o=>o.L);
  list.forEach((o,i)=> o.qualified = i<8);
  return {ranked:list, qualifiedLetters};
}
function renderThirds(){
  const grid=document.getElementById("thirdsGrid"); grid.innerHTML="";
  const note=document.getElementById("thirdNote");
  const done=LETTERS.filter(groupDone).length;

    : t('third_note_done');

    const d=document.createElement("div"); d.className="third "+cls;

    grid.appendChild(d);
  });
}

// ---------- BRACKET ----------
// Assign the 8 chosen third-place groups to the 8 official slots, respecting each
// slot's eligibility (bipartite matching, Kuhn's algorithm). Returns slot->group letter.
function getMatching(){
  const groups = state.thirds.slice().sort();
  const adj = {};
  groups.forEach(g => adj[g] = THIRD_SLOT_ELIG.map((e,i)=>e.includes(g)?i:-1).filter(i=>i>=0));
  const matchSlot = new Array(THIRD_SLOT_ELIG.length).fill(null);
  function tryK(g,vis){
    for(const s of adj[g]){
      if(!vis.has(s)){ vis.add(s);
        if(matchSlot[s]===null || tryK(matchSlot[s],vis)){ matchSlot[s]=g; return true; } }
    }
    return false;
  }
  groups.forEach(g => tryK(g,new Set()));
  // safety fallback: place any unmatched group into any still-empty slot
  const used = new Set(matchSlot.filter(Boolean));
  const left = groups.filter(g=>!used.has(g));
  let li=0;
  for(let s=0;s<matchSlot.length && li<left.length;s++){ if(matchSlot[s]===null) matchSlot[s]=left[li++]; }
  return matchSlot;
}
function resolveToken(tok){
  if(tok.startsWith("W_")) return placed(tok[2],0);
  if(tok.startsWith("R_")) return placed(tok[2],1);
  if(tok.startsWith("S")){ const g=getMatching()[+tok.slice(1)]; return g?placed(g,2):null; }
  return null;
}
function matchTeams(round, idx){
  if(round===0){ return [resolveToken(R32[idx][0]), resolveToken(R32[idx][1])]; }
  return [ winnerOf(round-1, idx*2), winnerOf(round-1, idx*2+1) ];
}
function winnerOf(round, idx){
  const [a,b]=matchTeams(round,idx);
  const pick=state.picks[round+"-"+idx];
  if(pick && (pick===a || pick===b)) return pick; // stale picks auto-ignored
  return null;
}
function bracketReady(){ return allGroupsDone() && state.thirds.length===8; }

// Seed tag shown beside each Round-of-32 team (e.g. 1°A, 2°C, 3°).
function seedLabel(tok){
  if(tok.startsWith("W_")) return "1°"+tok[2];
  if(tok.startsWith("R_")) return "2°"+tok[2];
  if(tok.startsWith("S"))  return "3°";
  return "";
}
function range(a,b){ const r=[]; for(let i=a;i<b;i++) r.push(i); return r; }

// Scale the whole bracket so it always fits the screen width at any resolution.
function fitBracket(){
  const fit=document.querySelector(".bracket-fit");
  const br=document.querySelector(".bracket26");
  if(!fit || !br) return;
  br.style.transform="none"; br.style.marginLeft="0";
  const natural=br.scrollWidth, naturalH=br.offsetHeight, avail=fit.clientWidth;
  if(!natural || !avail) return;
  let s=avail/natural; if(s>1.5) s=1.5; if(s<0.2) s=0.2;
  br.style.transform="scale("+s+")";
  const leftover=avail - natural*s;
  br.style.marginLeft=(leftover>0?leftover/2:0)+"px";
  fit.style.height=(naturalH*s)+"px";
}
function renderBracket(){
  const host=document.getElementById("bracketHost"); host.innerHTML="";
  const stage=document.createElement("div"); stage.className="bracket-stage";
  stage.appendChild(stageHead());
  if(!bracketReady()){
    const lock=document.createElement("div"); lock.className="lock";
    lock.innerHTML=t('lock_msg',{update:`<b>${t('btn_update')}</b>`, n:LETTERS.filter(groupDone).length});
    stage.appendChild(lock); host.appendChild(stage); return;
  }
  const fit=document.createElement("div"); fit.className="bracket-fit";
  const br=document.createElement("div"); br.className="bracket26";
  br.appendChild(buildSide("left"));
  br.appendChild(buildCenter());
  br.appendChild(buildSide("right"));
  fit.appendChild(br); stage.appendChild(fit); host.appendChild(stage);
  fitBracket();
}
// Re-render after a pick without the page jumping (preserve scroll position).
function rerenderBracket(){
  const y=window.scrollY; renderBracket(); window.scrollTo(0,y);
}
function buildSide(side){
  const wrap=document.createElement("div"); wrap.className="side "+side;
  SIDE_COLS[side].forEach(def=>{
    const col=document.createElement("div"); col.className="col "+def.cls;
    const lab=document.createElement("div"); lab.className="collabel";
    lab.textContent=t({"col-r16":"rl_r32","col-oct":"rl_r16","col-cua":"rl_qf","col-sem":"rl_sf"}[def.cls]);
    col.appendChild(lab);
    const cells=document.createElement("div"); cells.className="cells";
    def.idxs.forEach(i=>{
      const cell=document.createElement("div"); cell.className="cell";
      cell.appendChild(gameCard(def.round,i));
      cells.appendChild(cell);
    });
    col.appendChild(cells); wrap.appendChild(col);
  });
  return wrap;
}
function buildCenter(){
  const col=document.createElement("div"); col.className="col center";
  const lab=document.createElement("div"); lab.className="collabel"; lab.textContent=t('rl_final');
  col.appendChild(lab);
  const cells=document.createElement("div"); cells.className="cells";

    : `<div class="lbl">🏆 ${t('champion')}</div><div class="cn">—</div>`;
  cells.appendChild(trophy); cells.appendChild(fc); cells.appendChild(cd);
  col.appendChild(cells);
  return col;
}
function gameCard(round,i){
  const [a,b]=matchTeams(round,i);
  const w=winnerOf(round,i);
  const seeds = round===0 ? [seedLabel(R32[i][0]), seedLabel(R32[i][1])] : ["",""];
  const card=document.createElement("div"); card.className="gamecard";
  card.appendChild(grow(a,round,i,w,seeds[0]));
  card.appendChild(grow(b,round,i,w,seeds[1]));
  return card;
}
function grow(name,round,idx,winner,seed){
  const s=document.createElement("div");
  const seedHtml=`<span class="seed">${seed||""}</span>`;
  if(!name){ s.className="grow empty"; s.innerHTML=`${seedHtml}<span class="flag">·</span><span class="nm">—</span>`; return s; }
  s.className="grow"+(winner===name?" win":"");
  s.innerHTML=`${seedHtml}<span class="flag">${FLAG[name]||"🏳️"}</span><span class="nm">${tname(name)}</span>`;
  s.onclick=()=>{ state.picks[round+"-"+idx]=name; save(); rerenderBracket(); };
  return s;
}

    +`<span class="pageind">${scorerPage+1} / ${pages}</span>`
    +`<button class="parrow" onclick="navScorers(1)" ${scorerPage===pages-1?'disabled':''}>›</button></span>`;
  return `<div class="infocard"><h3>${title}${nav}</h3>${scorerRows(slice,start)}</div>`;
}
function navScorers(d){ scorerPage+=d; renderStats(); renderPlayers(); }
function renderOverview(){
  const host=document.getElementById("overviewHost");
  const champ = bracketReady() ? winnerOf(4,0) : null;
  const hostFlags = TOURNAMENT.hosts.map(c=>FLAG[c]).join(" ");
  const top=ALL_SCORERS[0];
  const qThirds = computeThirds().ranked.filter(o=>o.qualified)
    .map(o=>`<div class="listrow"><span class="flag">${FLAG[o.name]||"🏳️"}</span>`
      +`<span class="nm">${tname(o.name)} <small>· ${t('third')} ${o.L}</small></span>`
      +`<span class="val">${o.s?o.s.p:"–"}<small> ${t('pt_abbr')}</small></span></div>`).join("");
  const champLink=`<span class="outlink" onclick="showView('bracket')">${t('tab_bracket')}</span>`;
  host.innerHTML=renderCR7()+`<div class="cardgrid">
    <div class="infocard"><h3>🏆 FIFA World Cup 2026</h3>
      <div class="big">${hostFlags}</div>
      <div class="sub">${t('ov_hosts')}<br>${TOURNAMENT.dates} · ${t('ov_format',{teams:TOURNAMENT.teams,groups:TOURNAMENT.groups})}<br><b>${t('status')}</b></div></div>
    <div class="infocard"><h3>🥇 ${t('ov_champ_title')}</h3>
      ${champ ? `<div class="big"><span class="flag" style="font-size:26px">${FLAG[champ]}</span> ${tname(champ)}</div><div class="sub">${t('ov_champ_crowned')}</div>`
              : `<div class="sub">${t('ov_champ_prompt',{bracket:champLink})}</div>`}</div>
    <div class="infocard"><h3>👟 ${t('ov_gb_title')}</h3>
      <div class="big"><span class="flag">${FLAG[top.c]}</span> ${top.n} · ${top.g}</div>
      <div class="sub">${t('ov_topscorers')}</div>${scorerRows(ALL_SCORERS.slice(0,3),0)}</div>
    <div class="infocard"><h3>🎯 ${t('ov_qthirds_title')}</h3>
      ${qThirds}</div>
  </div>`+renderMatchList();
}
function mc(a,b,sa,sb,stage){
  const info=(a&&b)?MATCH_INFO[matchKey(a,b)]:null;
  let mid=`<span class="vs">${t('vs')}</span>`;
  if(info&&info.s){ const home=info.h===a; const ga=home?info.s[0]:info.s[1], gb=home?info.s[1]:info.s[0];
    mid=`<span class="mscore">${ga}-${gb}</span>`; }
  return `<div class="matchcard" data-a="${a||''}" data-b="${b||''}" data-stage="${stage||''}">`
    +`<span class="t"><span class="flag">${FLAG[a]||"🏳️"}</span>${sa?`<span class="seed">${sa}</span>`:""}<span class="nm">${a?tname(a):"—"}</span></span>`
    +mid
    +`<span class="t r"><span class="nm">${b?tname(b):"—"}</span>${sb?`<span class="seed">${sb}</span>`:""}<span class="flag">${FLAG[b]||"🏳️"}</span></span>`
    +`</div>`;
}
function dateSortKey(d){ if(!d) return 99999; const p=d.split(" "); const m={Jun:6,Jul:7}[p[0]]||9; return m*100+(parseInt(p[1],10)||0); }
// All 72 group fixtures, grouped under date headers in chronological order, then the knockout ties.
function renderMatchList(){
  const all=[];
  LETTERS.forEach(L=>{
    const ts=GROUPS[L];
    for(let i=0;i<ts.length;i++) for(let j=i+1;j<ts.length;j++){
      const a=ts[i], b=ts[j], info=MATCH_INFO[matchKey(a,b)];
      all.push({a,b,L,date:info&&info.date?info.date:null});
    }
  });
  all.sort((x,y)=> dateSortKey(x.date)-dateSortKey(y.date));
  let html=`<h2 class="sec">${t('m_groupstage')}</h2>`, cur=null;
  all.forEach(m=>{
    if(m.date!==cur){ if(cur!==null) html+=`</div>`; cur=m.date; html+=`<div class="mgrp">${m.date||t('m_tbd')}</div><div class="cardgrid">`; }
    html+=mc(m.a,m.b,"","",`${t('group')} ${m.L}`);
  });
  if(cur!==null) html+=`</div>`;
  let ko="";
  if(bracketReady()){ for(let i=0;i<16;i++){ const [a,b]=matchTeams(0,i); ko+=mc(a,b,seedLabel(R32[i][0]),seedLabel(R32[i][1]),t('m_knockout')); } }
  html+=`<h2 class="sec">${t('m_knockout')}</h2><div class="cardgrid">${ko}</div>`;
  const bl=`<span class="outlink" onclick="showView('bracket')">${t('tab_bracket')}</span>`;
  html+=`<p class="viewnote">${t('m_alllater',{bracket:bl})} ${t('m_note',{link:officialLink()})}</p>`;
  return html;
}
// Click a match → popover with stage, points, score, and (where known) date/venue/kickoff in CST.
function getPopover(){ let p=document.getElementById("mpop"); if(!p){ p=document.createElement("div"); p.id="mpop"; p.className="mpop"; document.body.appendChild(p);} return p; }
function hideMatchPopover(){ const p=document.getElementById("mpop"); if(p) p.style.display="none"; }
function openMatchPopover(card){
  const a=card.dataset.a, b=card.dataset.b, stage=card.dataset.stage||"";
  if(!a||!b) return;
  const info=MATCH_INFO[matchKey(a,b)];
  let score=`<span class="mpop-score">${t('vs')}</span>`;
  if(info&&info.s){ const home=info.h===a; const ga=home?info.s[0]:info.s[1], gb=home?info.s[1]:info.s[0];
    score=`<span class="mpop-score">${ga} - ${gb}</span>`; }
  let info2;
  if(info&&info.date){ info2=`📅 ${info.date}`+(info.venue?`<br>📍 ${info.venue}`:``)+(info.time?`<br>🕐 ${info.time}`:``); }
  else { info2=`${t('m_sched')} ${officialLink()}`; }
  const pa=REAL_POINTS[a]!=null?`<span class="mpop-pts">${REAL_POINTS[a]} ${t('pt_abbr')}</span>`:"";
  const pb=REAL_POINTS[b]!=null?`<span class="mpop-pts">${REAL_POINTS[b]} ${t('pt_abbr')}</span>`:"";
  const pop=getPopover();
  pop.innerHTML=`<div class="mpop-stage">${stage}</div>`
    +`<div class="mpop-teams"><span class="mpop-side"><span class="flag">${FLAG[a]||"🏳️"}</span> ${tname(a)} ${pa}</span>`
    +score
    +`<span class="mpop-side r">${pb} ${tname(b)} <span class="flag">${FLAG[b]||"🏳️"}</span></span></div>`
    +`<div class="mpop-info">${info2}</div>`;
  pop.style.display="block";
  const r=card.getBoundingClientRect();
  let left=r.left+window.scrollX;
  const maxLeft=window.scrollX+document.documentElement.clientWidth-pop.offsetWidth-8;
  if(left>maxLeft) left=maxLeft; if(left<window.scrollX+8) left=window.scrollX+8;
  pop.style.left=left+"px";
  pop.style.top=(r.bottom+window.scrollY+6)+"px";
}
function renderMatches(){ document.getElementById("matchesHost").innerHTML=renderMatchList(); }
// ⭐ Ronaldo featured card, reused across views.
function renderCR7(){
  const p=FEATURED_PLAYER;
  return `<div class="cr7card"><div class="cr7tag">${t('cr7_tag')}</div>`
    +`<div class="cr7name"><span class="flag">${FLAG[p.c]}</span> ${p.n} <span class="cr7g">${p.g} ${t('goals_abbr')}</span></div>`
    +`<div class="cr7note">${t('cr7_note')}</div></div>`;
}
function officialLink(){
  return `<a class="outlink" href="${TOURNAMENT.official}" target="_blank" rel="noopener">${t('official')}</a>`;
}
function renderStats(){
  document.getElementById("statsHost").innerHTML=
    `<h2 class="sec">${t('stats_title')} <span class="hint">${t('stats_hint')}</span></h2>`
    +renderCR7()
    +`<div class="cardgrid">
       ${scorerCard('👟 '+t('stats_top_title'))}
       <div class="infocard"><h3>📊 ${t('stats_tour_title')}</h3>
         <div class="sub">${t('stats_tour_text',{teams:TOURNAMENT.teams,groups:TOURNAMENT.groups})}</div></div>
     </div>
     <p class="viewnote">${t('stats_note',{link:officialLink()})}</p>`;
}
function renderPlayers(){
  document.getElementById("playersHost").innerHTML=
    `<h2 class="sec">${t('players_title')} <span class="hint">${t('players_hint')}</span></h2>`
    +renderCR7()
    +`<div class="cardgrid">${scorerCard('⭐ '+t('players_watch'))}</div>
     <p class="viewnote">${t('players_note',{link:officialLink()})}</p>`;
}
function showView(name){
  hideMatchPopover();
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active", t.dataset.view===name));
  document.querySelectorAll(".view").forEach(v=>v.classList.toggle("active", v.id==="v-"+name));
  try{ localStorage.setItem(VIEW_KEY,name); }catch(e){}
  if(name==="bracket") fitBracket();
}

function renderAll(){
  state.thirds = computeThirds().qualifiedLetters; // auto-qualified best 8
  renderStandings(); renderThirds(); renderBracket();
  renderOverview(); renderMatches(); renderStats(); renderPlayers();
}

document.getElementById("clearBtn").onclick=clearAll;
document.getElementById("realBtn").onclick=useRealResults;
document.getElementById("themeBtn").onclick=toggleTheme;
document.getElementById("langSel").onchange=(e)=>applyLang(e.target.value);
document.querySelectorAll(".tab").forEach(b=> b.onclick=()=>showView(b.dataset.view));
document.addEventListener("click",(e)=>{
  const card=e.target.closest(".matchcard");
  if(card){ openMatchPopover(card); return; }
  const pop=document.getElementById("mpop");
  if(pop && pop.style.display==="block" && !pop.contains(e.target)) hideMatchPopover();
});

// Auto-apply the real results on open whenever the stored data is new
// (first ever open, or after the results have been refreshed). Knockout picks are kept.
if(state.realVersion !== REAL_RESULTS_VERSION){
  LETTERS.forEach(L=> state.ranks[L] = REAL_RESULTS[L].slice(0,3));
  state.realVersion = REAL_RESULTS_VERSION;
  save();
}

applyTheme(localStorage.getItem(THEME_KEY) || "dark");
applyLang(LANG);          // sets all static text + renders every view
showView(localStorage.getItem(VIEW_KEY) || "overview");
window.addEventListener("resize", fitBracket);
window.addEventListener("load", fitBracket);
</script>
</body>
</html>
